<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd1"/>
      <stop offset="100%" style="stop-color:#ffdbac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#2a2a3e"/>
  
  <!-- Rosie Body (dome shape) -->
  <ellipse cx="256" cy="320" rx="160" ry="140" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  
  <!-- Neck -->
  <rect x="236" y="240" width="40" height="60" fill="#e85d04"/>
  
  <!-- Head -->
  <ellipse cx="256" cy="200" rx="90" ry="80" fill="url(#faceGrad)"/>
  
  <!-- Hair/Rollers -->
  <ellipse cx="256" cy="140" rx="80" ry="40" fill="#ff6b35"/>
  <circle cx="176" cy="140" r="25" fill="#ff6b35"/>
  <circle cx="336" cy="140" r="25" fill="#ff6b35"/>
  
  <!-- Eyes -->
  <ellipse cx="220" cy="190" rx="20" ry="25" fill="#2a2a3e"/>
  <ellipse cx="292" cy="190" rx="20" ry="25" fill="#2a2a3e"/>
  <circle cx="220" cy="190" r="8" fill="#fff"/>
  <circle cx="292" cy="190" r="8" fill="#fff"/>
  
  <!-- Eyelashes -->
  <line x1="200" y1="170" x2="190" y2="160" stroke="#2a2a3e" stroke-width="4" stroke-linecap="round"/>
  <line x1="240" y1="170" x2="250" y2="160" stroke="#2a2a3e" stroke-width="4" stroke-linecap="round"/>
  <line x1="272" y1="170" x2="262" y2="160" stroke="#2a2a3e" stroke-width="4" stroke-linecap="round"/>
  <line x1="312" y1="170" x2="322" y2="160" stroke="#2a2a3e" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M226 240 Q256 260 286 240" fill="none" stroke="#2a2a3e" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Blush -->
  <ellipse cx="190" cy="220" rx="15" ry="10" fill="#ff6b35" opacity="0.3"/>
  <ellipse cx="322" cy="220" rx="15" ry="10" fill="#ff6b35" opacity="0.3"/>
  
  <!-- Body details -->
  <circle cx="256" cy="320" r="30" fill="#2a2a3e" opacity="0.1"/>
  
  <!-- Apron tie -->
  <path d="M216 280 L256 320 L296 280" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
</svg>
