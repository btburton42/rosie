<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ff6b35">
  <meta name="description" content="Meet Rosie - Your personal AI assistant">
  
  <title>Rosie 🤖</title>
  
  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="/rosie-icon.svg">
  <link rel="icon" type="image/svg+xml" href="/rosie-icon.svg">
  
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background: #2a2a3e;
    }
    
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    
    /* iOS safe area support */
    @supports (padding-top: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }
    
    /* Rosie Loading State */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
      color: #ffecd1;
      z-index: 9999;
      transition: opacity 0.3s ease;
      gap: 1.5rem;
    }
    
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .rosie-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffd93d 100%);
      border-radius: 50% 50% 45% 45%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 
        0 10px 40px rgba(255, 107, 53, 0.4),
        inset 0 -10px 20px rgba(0, 0, 0, 0.2);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .loading-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ff6b35;
      letter-spacing: 0.1em;
    }
    
    .loading-dots {
      display: flex;
      gap: 0.5rem;
    }
    
    .loading-dots span {
      width: 8px;
      height: 8px;
      background: #ff6b35;
      border-radius: 50%;
      animation: dots 1.4s ease-in-out infinite both;
    }
    
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes dots {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="rosie-logo">🤖</div>
    <div class="loading-text">Waking Rosie up</div>
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  
  <rosie-app></rosie-app>
  
  <script type="module" src="/src/main.ts"></script>
  
  <script>
    // Hide loading spinner when app is ready
    document.addEventListener('DOMContentLoaded', () => {
      const loading = document.getElementById('loading');
      const rosieApp = document.querySelector('rosie-app');
      
      if (rosieApp) {
        rosieApp.addEventListener('load', () => {
          loading.classList.add('hidden');
        });
      }
      
      // Fallback: hide after 3 seconds
      setTimeout(() => {
        loading.classList.add('hidden');
      }, 3000);
    });
    
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('Rosie SW registered:', registration);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
    
    // Prevent zoom on double tap (iOS)
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (event) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  </script>
</body>
</html>
